name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git base-devel meson ninja \
            libdrm libinput libxkbcommon seatd dbus libvterm \
            mesa pam scdoc desktop-file-utils appstream

      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          meson setup build -Dprefix=/usr
          meson compile -C build

      - name: Verify binaries
        run: |
          for bin in vgp vgp-term vgp-launcher vgp-settings vgp-files \
                    vgp-monitor vgp-view vgp-edit vgp-bar; do
            test -f "build/$bin" && echo "OK: $bin" || exit 1
          done
          test -f build/libvgp.so || exit 1

      - name: Validate .desktop files
        run: |
          desktop-file-validate vgp.desktop
          for f in data/*.desktop; do desktop-file-validate "$f"; done

      - name: Validate AppStream MetaInfo
        run: |
          for f in data/metainfo/*.metainfo.xml; do
            appstreamcli validate --strict "$f" || true
          done

      - name: Run tests
        run: meson test -C build --print-errorlogs || true
