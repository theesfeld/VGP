name: Release

# Two triggers, both supported:
#
#   1. GitHub UI -- the "Draft a new release" button on the Releases
#      page. Type a new tag (e.g. v0.2.0), pick a target commit,
#      optionally click "Generate release notes" to fill in the
#      PR-based summary, then Publish. The workflow fires on the
#      `release: published` event and attaches every built artifact
#      to the release.
#
#   2. Command line -- `git tag -a v0.2.0 -m ...` followed by
#      `git push origin v0.2.0`. The workflow fires on `push: tags`
#      and creates a release from scratch.
#
# Either way, end state is a single GitHub Release with source /
# Arch / Debian / Fedora artifacts + SHA256SUMS attached and a body
# containing user-provided notes, the git-log since the previous tag,
# and install instructions.
on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Normalise the tag name regardless of trigger.
env:
  TAG: ${{ github.event.release.tag_name || github.ref_name }}

jobs:
  # ==========================================================
  # Source tarball (plain `.tar.gz` of the tagged source tree)
  # ==========================================================
  source:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          submodules: recursive
          fetch-depth: 0

      - id: ver
        run: |
          V="${TAG#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Create source tarball
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git archive --format=tar.gz \
            --prefix="vgp-${V}/" \
            -o "vgp-${V}.tar.gz" HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: vgp-*.tar.gz

  # ==========================================================
  # Arch binary tarball + AUR publish
  # ==========================================================
  arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git base-devel meson ninja pkgconf \
            libdrm libinput libxkbcommon libseat dbus libvterm \
            mesa pam scdoc desktop-file-utils appstream

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Build
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          arch-meson build
          meson compile -C build
          DESTDIR="$PWD/pkg" meson install -C build
          tar czf "vgp-${TAG#v}-arch-x86_64.tar.gz" -C pkg .

      - uses: actions/upload-artifact@v4
        with:
          name: arch-tarball
          path: vgp-*-arch-x86_64.tar.gz

  # ==========================================================
  # Debian / Ubuntu .deb
  # ==========================================================
  deb:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Install build tools
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            git build-essential devscripts debhelper-compat \
            meson ninja-build pkgconf \
            libdrm-dev libinput-dev libudev-dev libxkbcommon-dev \
            libgbm-dev libegl-dev libgles-dev \
            libdbus-1-dev libseat-dev libpam0g-dev libvterm-dev \
            scdoc desktop-file-utils appstream \
            fakeroot ca-certificates

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Update debian/changelog for tag
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          export DEBEMAIL="tj.theesfeld@citywide.io"
          export DEBFULLNAME="William Theesfeld"
          VER="${TAG#v}"
          # Rewrite top changelog entry to the tag version.
          dch --newversion "$VER" --distribution unstable "Release ${VER}."

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../*.deb dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb

  # ==========================================================
  # Fedora / RHEL .rpm
  # ==========================================================
  rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Install build tools
        run: |
          dnf -y install \
            git rpm-build rpmdevtools \
            gcc meson ninja-build pkgconf-pkg-config \
            libdrm-devel libinput-devel libudev-devel libxkbcommon-devel \
            mesa-libgbm-devel mesa-libEGL-devel mesa-libGLES-devel \
            dbus-devel libseat-devel pam-devel libvterm-devel \
            scdoc desktop-file-utils libappstream-glib

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Prepare source tarball for rpmbuild
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          VER="${TAG#v}"
          mkdir -p ~/rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          git archive --format=tar.gz \
            --prefix="VGP-${VER}/" \
            -o "$HOME/rpmbuild/SOURCES/vgp-${VER}.tar.gz" HEAD
          sed "s/^Version:.*/Version:        ${VER}/" rpm/vgp.spec \
            > ~/rpmbuild/SPECS/vgp.spec

      - name: Build .rpm
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/vgp.spec
          mkdir -p dist
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} dist/ \;
          find ~/rpmbuild/SRPMS -name '*.rpm' -exec cp {} dist/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: dist/*.rpm

  # ==========================================================
  # Collect + publish GitHub Release
  # ==========================================================
  publish:
    needs: [source, arch, deb, rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.deb' \
                                   -o -name '*.rpm' \) \
            -exec cp -v {} release/ \;
          (cd release && sha256sum * > SHA256SUMS)
          ls -la release

      # ------------------------------------------------------
      # Assemble the release body APPENDIX:
      #
      #   - Commits: `git log` since the previous tag, each line
      #     `- subject (shortSHA) — @author`. Catches direct
      #     pushes to master that the PR-based auto-notes miss.
      #   - Artifacts + Install: the distro-install one-liners.
      #
      # What's NOT in here (by design):
      #   - No CHANGELOG extraction. If you want Highlights, type
      #     them in the "Draft release" UI before publishing.
      #   - No PR "What's Changed" summary -- GitHub renders that
      #     automatically (either because you clicked the
      #     "Generate release notes" button in the UI, or because
      #     we set generate_release_notes=true below).
      #
      # The action sets `append_body: true` so user-typed notes
      # and the auto-generated PR list both survive; we just
      # add our section at the bottom.
      # ------------------------------------------------------
      - name: Build release body appendix
        id: body
        env:
          REPO: ${{ github.repository }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          RANGE="${PREV_TAG:+${PREV_TAG}..}${TAG}"
          COMPARE_URL="${PREV_TAG:+https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}}"

          COMMITS=$(git log --pretty='- %s ([`%h`](https://github.com/'"${REPO}"'/commit/%H)) — @%aN' "$RANGE")

          {
            echo "## Commits"
            echo
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "_No commits since the last tag._"
            fi
            echo

            if [ -n "$COMPARE_URL" ]; then
              echo "**Full diff:** $COMPARE_URL"
              echo
            fi

            echo "## Artifacts"
            echo
            echo "- \`vgp-<version>.tar.gz\` — source tarball"
            echo "- \`vgp-<version>-arch-x86_64.tar.gz\` — Arch-compatible prefix tree"
            echo "- \`vgp_<version>_amd64.deb\` + \`libvgp0_<version>_amd64.deb\` + \`libvgp-dev_<version>_amd64.deb\` — Debian / Ubuntu"
            echo "- \`vgp-<version>-1.fc*.x86_64.rpm\` + \`vgp-libs-<version>-*.rpm\` + \`vgp-devel-<version>-*.rpm\` — Fedora / RHEL / openSUSE"
            echo "- \`SHA256SUMS\` — SHA-256 checksums for every artifact"
            echo
            echo "## Install"
            echo
            echo "**Arch / CachyOS** — \`yay -S vgp-git\`"
            echo "**Debian / Ubuntu** — \`sudo apt install ./vgp_*.deb ./libvgp0_*.deb\`"
            echo "**Fedora / RHEL** — \`sudo dnf install ./vgp-*.rpm ./vgp-libs-*.rpm\`"
            echo "**openSUSE** — \`sudo zypper install ./vgp-*.rpm ./vgp-libs-*.rpm\`"
            echo "**Source** — \`tar xf vgp-*.tar.gz && cd vgp-* && meson setup build && sudo meson install -C build\`"
            echo
            echo "Verify with the shipped checksums: \`sha256sum -c SHA256SUMS --ignore-missing\`."
          } > release-body.md

          echo "body_path=release-body.md" >> "$GITHUB_OUTPUT"

      # Attach artifacts + append our commit-log / install footer.
      # append_body: true keeps any existing body (user-typed notes
      # from the UI, or the "Generate release notes" output).
      # generate_release_notes: true fills in the PR-based summary
      # if the release was created by a raw tag push (not via UI).
      - name: Publish / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: release/*
          body_path: ${{ steps.body.outputs.body_path }}
          append_body: true
          generate_release_notes: true

  # ==========================================================
  # AUR push (best-effort -- skipped if AUR_SSH_PRIVATE_KEY secret
  # isn't set; failures here don't fail the overall release run).
  # ==========================================================
  aur:
    needs: publish
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Check AUR secret
        id: aur_secret
        run: |
          if [ -n "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AUR_SSH_PRIVATE_KEY secret not set -- skipping AUR publish"
          fi

      - name: Update PKGBUILD version
        if: ${{ steps.aur_secret.outputs.present == 'true' }}
        run: |
          VERSION="${TAG#v}"
          sed -i "s/pkgver=.*/pkgver=$VERSION/" PKGBUILD

      - name: Setup SSH for AUR
        if: ${{ steps.aur_secret.outputs.present == 'true' }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config << SSHEOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Publish to AUR
        if: ${{ steps.aur_secret.outputs.present == 'true' }}
        run: |
          VERSION="${TAG#v}"
          git clone ssh://aur@aur.archlinux.org/vgp-git.git /tmp/aur-pkg
          cp PKGBUILD /tmp/aur-pkg/
          sed -i "s/pkgver=.*/pkgver=$VERSION/" /tmp/aur-pkg/PKGBUILD
          cd /tmp/aur-pkg
          # Generate .SRCINFO manually (no makepkg on ubuntu)
          cat > .SRCINFO << SRCEOF
          pkgbase = vgp-git
          	pkgdesc = GPU-accelerated vector display server and desktop environment
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/theesfeld/VGP
          	arch = x86_64
          	license = MIT
          	makedepends = meson
          	makedepends = ninja
          	makedepends = git
          	makedepends = pkgconf
          	makedepends = scdoc
          	depends = libdrm
          	depends = libinput
          	depends = libxkbcommon
          	depends = libseat
          	depends = dbus
          	depends = libvterm
          	depends = mesa
          	depends = pam
          	provides = vgp=${VERSION}
          	conflicts = vgp
          	source = vgp::git+https://github.com/theesfeld/VGP.git

          pkgname = vgp-git
          SRCEOF
          sed -i 's/^          //' .SRCINFO
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}" || true
          git push origin master
