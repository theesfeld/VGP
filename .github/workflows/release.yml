name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git base-devel meson ninja \
            libdrm libinput libxkbcommon seatd dbus libvterm \
            mesa pam

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build and test
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          meson setup build -Dprefix=/usr -Dbuildtype=release
          meson compile -C build
          echo "Build successful"
          ls -la build/vgp build/vgp-term build/vgp-launcher \
                 build/vgp-settings build/vgp-files build/vgp-monitor build/vgp-view
          DESTDIR="$PWD/pkg" meson install -C build
          tar czf "vgp-${TAG_NAME}-x86_64.tar.gz" -C pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vgp-release
          path: vgp-*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vgp-*.tar.gz
          generate_release_notes: true
          body: |
            ## VGP ${{ github.ref_name }}

            GPU-accelerated vector display server for Linux.

            ### Install (Arch/CachyOS)
            ```
            yay -S vgp-git
            ```

            ### Install from tarball
            ```
            tar xzf vgp-*.tar.gz -C /
            ```

  aur:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate .SRCINFO and update version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          sed -i "s/pkgver=.*/pkgver=$VERSION/" PKGBUILD

          # Generate .SRCINFO manually (no makepkg available on ubuntu)
          cat > .SRCINFO << SRCEOF
          pkgbase = vgp-git
          	pkgdesc = GPU-accelerated vector display server and desktop environment
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/theesfeld/VGP
          	arch = x86_64
          	license = MIT
          	makedepends = meson
          	makedepends = ninja
          	makedepends = git
          	depends = libdrm
          	depends = libinput
          	depends = libxkbcommon
          	depends = seatd
          	depends = dbus
          	depends = libvterm
          	depends = mesa
          	depends = pam
          	provides = vgp
          	conflicts = vgp
          	source = git+https://github.com/theesfeld/VGP.git

          pkgname = vgp-git
          SRCEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' .SRCINFO

      - name: Setup SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config << SSHEOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Publish to AUR
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          git clone ssh://aur@aur.archlinux.org/vgp-git.git /tmp/aur-pkg
          cp PKGBUILD /tmp/aur-pkg/
          sed -i "s/pkgver=.*/pkgver=$VERSION/" /tmp/aur-pkg/PKGBUILD
          cd /tmp/aur-pkg
          # Generate .SRCINFO
          cat > .SRCINFO << SRCEOF
          pkgbase = vgp-git
          	pkgdesc = GPU-accelerated vector display server and desktop environment
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/theesfeld/VGP
          	arch = x86_64
          	license = MIT
          	makedepends = meson
          	makedepends = ninja
          	makedepends = git
          	depends = libdrm
          	depends = libinput
          	depends = libxkbcommon
          	depends = seatd
          	depends = dbus
          	depends = libvterm
          	depends = mesa
          	depends = pam
          	provides = vgp
          	conflicts = vgp
          	source = git+https://github.com/theesfeld/VGP.git

          pkgname = vgp-git
          SRCEOF
          sed -i 's/^          //' .SRCINFO
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}" || true
          git push origin master
